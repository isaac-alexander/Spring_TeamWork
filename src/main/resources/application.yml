spring:
  application:
    name: teamwork

  datasource:
    url: jdbc:mysql://localhost:3306/teamwork_db?&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&useLegacyDatetimeCode=false
    username: root
    password: root

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: create

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
      enabled: true

  mvc:
    hiddenmethod:
      filter:
        enabled: true

server:
  port: 8080

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}