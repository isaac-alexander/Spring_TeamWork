<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Articles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand" th:href="@{/feed}">TEAMWORK</a>

        <!-- navigation links -->
        <div class="d-flex gap-2">
            <a class="btn btn-outline-light" th:href="@{/feed}">Feed</a>
            <a class="btn btn-outline-light" th:href="@{/gifs}">GIFs</a>
        </div>

        <!-- create employee for admin and logout buttons -->
        <div class="ms-auto d-flex gap-2">
            <a class="btn btn-outline-light"
               th:if="${user.role == 'admin'}"
               th:href="@{/register}">
                Create Employee
            </a>
            <a class="btn btn-outline-danger" th:href="@{/logout}">Logout</a>
        </div>

    </div>
</nav>

<div class="container py-4">

    <!-- create article form -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">

            <h4 class="mb-3">Create Article</h4>

            <form th:action="@{/articles}" method="post">

                <!-- article title input -->
                <input type="text"
                       name="title"
                       class="form-control mb-3"
                       placeholder="Title">

                <!-- article content input -->
                <textarea name="content"
                          class="form-control mb-3"
                          rows="4"
                          placeholder="Write your article"></textarea>

                <!-- post button -->
                <button class="btn btn-outline-dark">Post</button>

            </form>
        </div>
    </div>

</div>
</body>
</html>
