<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Articles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">TEAMWORK - ARTICLES</span>
        <a class="btn btn-light" th:href="@{/feed}">Back to Feed</a>
    </div>
</nav>

<div class="container mt-4">

    <h4>Create Article</h4>

    <form th:action="@{/articles}" method="post">

        <input type="text" name="title"
               class="form-control mb-2"
               placeholder="Title">

        <textarea name="content"
                  class="form-control mb-2"
                  placeholder="Write your article"></textarea>

        <button class="btn btn-primary">Post</button>

    </form>

    <hr>

    <h5>Your Articles</h5>

    <div th:each="article : ${articles}" class="card mb-3">
        <div class="card-body">
            <h5 th:text="${article.title}"></h5>
            <p th:text="${article.content}"></p>
            <small>
                By <span th:text="${article.author}"></span> |
                <span th:text="${article.createdAt}"></span>
            </small>
        </div>
    </div>

</div>

</body>
</html>
