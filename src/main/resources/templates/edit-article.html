<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Article</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand"
           th:href="@{/feed}">TEAMWORK</a>

        <div class="d-flex gap-2">
            <a class="btn btn-outline-light"
               th:href="@{/feed}">Feed</a>
            <a class="btn btn-outline-light"
               th:href="@{/articles}">Articles</a>
            <a class="btn btn-outline-light"
               th:href="@{/gifs}">GIFs</a>
        </div>

        <div class="ms-auto d-flex gap-2">
            <a class="btn btn-outline-light"
               th:if="${user.role == 'admin'}"
               th:href="@{/register}">
                Create Employee
            </a>
            <a class="btn btn-outline-danger"
               th:href="@{/logout}">Logout</a>
        </div>

    </div>
</nav>
<div class="container py-5">

    <div class="card shadow-sm">
        <div class="card-body">

            <h3 class="mb-4">Edit Article</h3>

            <form th:action="@{/articles/update}" method="post">

                <input type="hidden" name="_method" value="PUT"/>

                <input type="hidden"
                       th:value="${article.id}"
                       name="id"/>

                <input type="text"
                       name="title"
                       th:value="${article.title}"
                       class="form-control mb-3"/>

                <textarea name="content"
                          class="form-control mb-3"
                          rows="5"
                          th:text="${article.content}"></textarea>

                <button class="btn btn-outline-dark">Update</button>

            </form>

        </div>
    </div>

</div>
</body>
</html>
