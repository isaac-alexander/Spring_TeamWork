<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>View GIF</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand"
           th:href="@{/feed}">TEAMWORK</a>

        <div class="d-flex gap-2">
            <a class="btn btn-outline-light"
               th:href="@{/articles}">Articles</a>
            <a class="btn btn-outline-light"
               th:href="@{/gifs}">GIFs</a>
        </div>

        <div class="ms-auto d-flex gap-2">
            <a class="btn btn-outline-light"
               th:if="${user.role == 'admin'}"
               th:href="@{/register}">
                Create Employee
            </a>
            <a class="btn btn-outline-danger"
               th:href="@{/logout}">Logout</a>
        </div>

    </div>
</nav>

<div class="container py-4">

    <div class="row justify-content-center">
        <div class="col-md-6">

            <!-- gif card -->
            <div class="card shadow-sm mb-4">

                <img th:src="${gif.imageUrl}"
                     class="card-img-top"
                     style="max-height: 350px; object-fit: cover;">

                <div class="card-body">

                    <h5 class="fw-bold"
                        th:text="${gif.title}"></h5>

                    <small class="text-secondary">
                        By <span th:text="${gif.author}"></span> |
                        <span th:text="${#temporals.format(gif.createdAt, 'dd MMM yyyy HH:mm')}"></span>
                    </small>

                </div>
            </div>

            <!-- comments -->
            <div class="card shadow-sm">
                <div class="card-body">

                    <h6 class="mb-3">Comments</h6>

                    <div th:if="${gif.comments != null}">
                        <div th:each="c : ${gif.comments}"
                             class="border-bottom mb-2 pb-2 small">
                            <span th:text="${c}"></span>
                        </div>
                    </div>

                    <form th:action="@{'/gifs/comment/' + ${gif.id}}"
                          method="post">
                        <div class="input-group input-group-sm">

                            <input type="text"
                                   name="comment"
                                   class="form-control"
                                   placeholder="Write a comment">

                            <button class="btn btn-outline-dark">
                                Post
                            </button>

                        </div>
                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
