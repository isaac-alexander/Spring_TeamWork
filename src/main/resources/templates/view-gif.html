<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>View GIF</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand" th:href="@{/feed}">TEAMWORK</a>

        <div class="d-flex gap-2">
            <a class="btn btn-outline-light" th:href="@{/articles}">Articles</a>
            <a class="btn btn-outline-light" th:href="@{/gifs}">GIFs</a>
        </div>

        <div class="ms-auto d-flex gap-2">
            <a class="btn btn-outline-light"
               th:if="${user.role == 'admin'}"
               th:href="@{/register}">
                Create Employee
            </a>
            <a class="btn btn-outline-danger" th:href="@{/logout}">Logout</a>
        </div>

    </div>
</nav>

<div class="container py-4">

    <div class="card shadow-sm mb-4">
        <div class="card-body">

            <h3 class="fw-bold" th:text="${gif.title}"></h3>

            <img th:src="${gif.imageUrl}"
                 class="img-fluid rounded mb-3"/>

            <small class="text-secondary">
                By <span th:text="${gif.author}"></span> |
                <span th:text="${gif.createdAt}"></span>
            </small>

        </div>
    </div>

    <!-- COMMENTS -->
    <div class="card shadow-sm">
        <div class="card-body">

            <h5>Comments</h5>

            <div th:if="${gif.comments != null}">
                <div th:each="c : ${gif.comments}" class="border-bottom mb-2 pb-2">
                    <span th:text="${c}"></span>
                </div>
            </div>

            <form th:action="@{'/gifs/comment/' + ${gif.id}}" method="post">
                <input type="text" name="comment"
                       class="form-control mb-2"
                       placeholder="Write a comment">

                <button class="btn btn-outline-dark btn-sm">Comment</button>
            </form>

        </div>
    </div>

</div>

</body>
</html>
