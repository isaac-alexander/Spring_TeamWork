<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>GIFs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/feed}">TEAMWORK</a>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-light" th:href="@{/feed}">Feed</a>
            <a class="btn btn-outline-light" th:href="@{/articles}">Articles</a>
        </div>
        <div class="ms-auto d-flex gap-2">
            <a class="btn btn-outline-light" th:if="${user.role == 'admin'}" th:href="@{/register}">Create Employee</a>
            <a class="btn btn-outline-danger" th:href="@{/logout}">Logout</a>
        </div>
    </div>
</nav>

<div class="container py-4">

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h4 class="mb-3">Create GIF</h4>
            <form th:action="@{/gifs}" method="post" enctype="multipart/form-data">
                <input type="text" name="title" class="form-control mb-3" placeholder="Title">
                <input type="text" name="imageUrl" class="form-control mb-3" placeholder="GIF URL">
                <button class="btn btn-outline-dark">Post</button>
            </form>
        </div>
    </div>

    <h5 class="mb-3">All GIFs</h5>
    <div th:each="gif : ${gifs}" class="card shadow-sm mb-3">
        <div class="card-body">
            <h5 class="fw-bold" th:text="${gif.title}"></h5>
            <img th:src="${gif.imageUrl}" class="img-fluid rounded mb-2" style="max-height:300px; object-fit:cover;">
            <small class="d-block mb-2 text-secondary">By <span th:text="${gif.author}"></span> | <span th:text="${gif.createdAt}"></span></small>

            <!-- view - edit - delete Buttons -->
            <div class="d-flex gap-2 mb-2">
                <a th:href="@{'/gifs/' + ${gif.id}}"
                   class="btn btn-outline-secondary btn-sm">
                    View
                </a>

                <a th:href="@{'/gifs/edit/' + ${gif.id}}" class="btn btn-outline-dark btn-sm" th:if="${gif.author == user.name}">Edit</a>

                <form th:action="@{'/gifs/delete/' + ${gif.id}}" method="post" th:if="${gif.author == user.name or user.role == 'admin'}">
                    <button class="btn btn-outline-danger btn-sm">Delete</button>
                </form>
            </div>

            <!-- Comments Section -->
            <div class="mb-2">
                <h6>Comments:</h6>
                <ul class="list-group mb-2">
                    <li class="list-group-item" th:each="c : ${gif.comments}" th:text="${c}"></li>
                </ul>

                <!-- Add Comment -->
                <form th:action="@{'/gifs/comment/' + ${gif.id}}" method="post">
                    <div class="input-group">
                        <input type="text" name="comment" class="form-control" placeholder="Add a comment">
                        <button class="btn btn-outline-dark" type="submit">Comment</button>
                    </div>
                </form>
            </div>

        </div>
    </div>

</div>
</body>
</html>
