<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>GIFs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<!-- navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand" th:href="@{/feed}">TEAMWORK</a>

        <!-- navigation links -->
        <div class="d-flex gap-2">
            <a class="btn btn-outline-light" th:href="@{/feed}">Feed</a>
            <a class="btn btn-outline-light" th:href="@{/articles}">Articles</a>
        </div>

        <!-- create employee for admin and logout buttons -->
        <div class="ms-auto d-flex gap-2">
            <a class="btn btn-outline-light"
               th:if="${user.role == 'admin'}"
               th:href="@{/register}">
                Create Employee
            </a>
            <a class="btn btn-outline-danger" th:href="@{/logout}">Logout</a>
        </div>

    </div>
</nav>

<div class="container py-4">

    <!-- create gif form -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">

            <h4 class="mb-3">Create GIF</h4>

            <form th:action="@{/gifs}" method="post" enctype="multipart/form-data">

                <!-- gif title input -->
                <input type="text"
                       name="title"
                       class="form-control mb-3"
                       placeholder="Title">

                <!-- gif file input -->
                <input type="file"
                       name="file"
                       class="form-control mb-3">

                <!-- post button -->
                <button class="btn btn-outline-dark">Post</button>

            </form>
        </div>
    </div>

</div>
</body>
</html>
