<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>GIFs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">TEAMWORK - GIFS</span>
        <a class="btn btn-light" th:href="@{/feed}">Back to Feed</a>
    </div>
</nav>

<div class="container mt-4">

    <h4>Create GIF</h4>

    <form th:action="@{/gifs}" method="post">

        <input type="text" name="title"
               class="form-control mb-2"
               placeholder="Title">

<!--        <input type="text" name="imageUrl"-->
<!--               class="form-control mb-2"-->
<!--               placeholder="Paste GIF image URL">-->

        <button class="btn btn-primary">Post</button>

    </form>

    <hr>

    <h5>All GIFs</h5>

    <div th:each="gif : ${gifs}" class="card mb-3">
        <div class="card-body">

            <h5 th:text="${gif.title}"></h5>

<!--            <img th:src="${gif.imageUrl}" class="img-fluid mb-2"/>-->

            <small>
                By <span th:text="${gif.author}"></span> |
                <span th:text="${gif.createdAt}"></span>
            </small>

        </div>
    </div>

</div>

</body>
</html>
