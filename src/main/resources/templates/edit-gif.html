<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit GIF</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand" th:href="@{/feed}">TEAMWORK</a>

        <div class="d-flex gap-2">
            <a class="btn btn-outline-light" th:href="@{/feed}">Feed</a>
            <a class="btn btn-outline-light" th:href="@{/articles}">Articles</a>
            <a class="btn btn-outline-light" th:href="@{/gifs}">GIFs</a>
        </div>

        <div class="ms-auto d-flex gap-2">
            <a class="btn btn-outline-light"
               th:if="${user.role == 'admin'}"
               th:href="@{/register}">
                Create Employee
            </a>
            <a class="btn btn-outline-light" th:href="@{/logout}">Logout</a>
        </div>

    </div>
</nav>
<div class="container py-5">

    <div class="card shadow-sm">
        <div class="card-body">

            <h3 class="mb-4">Edit GIF</h3>

            <form th:action="@{/gifs/update}" method="post">

                <input type="hidden" th:value="${gif.id}" name="id"/>

                <input type="text" name="title"
                       th:value="${gif.title}"
                       class="form-control mb-3"/>

                <input type="text" name="imageUrl"
                       th:value="${gif.imageUrl}"
                       class="form-control mb-3"/>

                <button class="btn btn-outline-dark">Update</button>

            </form>

        </div>
    </div>

</div>
</body>
</html>
