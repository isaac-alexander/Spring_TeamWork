<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Feed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand" th:href="@{/feed}">TEAMWORK</a>

        <div class="d-flex gap-2">
            <a class="btn btn-outline-light" th:href="@{/articles}">Articles</a>
            <a class="btn btn-outline-light" th:href="@{/gifs}">GIFs</a>
        </div>

        <div class="ms-auto d-flex gap-2">
            <a class="btn btn-outline-light"
               th:if="${user.role == 'admin'}"
               th:href="@{/register}">
                Create Employee
            </a>
            <a class="btn btn-outline-danger" th:href="@{/logout}">Logout</a>
        </div>

    </div>
</nav>
<div class="container py-4">

    <div class="mb-4">
        <h4>Welcome, <span th:text="${user.name}"></span></h4>

        <div class="d-flex gap-2 mt-3">
            <a class="btn btn-outline-dark" th:href="@{/articles}">View Articles</a>
            <a class="btn btn-outline-dark" th:href="@{/gifs}">View GIFs</a>
        </div>
    </div>

    <hr class="mb-4">

    <h4 class="mb-3">Articles</h4>

    <div th:each="article : ${articles}" class="card shadow-sm mb-3">
        <div class="card-body">
            <h5 class="fw-bold" th:text="${article.title}"></h5>
            <p class="text-muted" th:text="${article.content}"></p>
            <small class="text-secondary">
                By <span th:text="${article.author}"></span>
            </small>
            <a th:href="@{'/articles/' + ${article.id}}"
               class="btn btn-outline-secondary btn-sm">
                View
            </a>
        </div>
    </div>

    <hr class="my-4">

    <h4 class="mb-3">GIFs</h4>

    <div th:each="gif : ${gifs}" class="card shadow-sm mb-3">
        <div class="card-body">
            <h5 class="fw-bold" th:text="${gif.title}"></h5>
            <img th:src="${gif.imageUrl}" class="img-fluid rounded mb-2"/>
            <small class="text-secondary">
                By <span th:text="${gif.author}"></span>
            </small>

            <a th:href="@{'/gifs/' + ${gif.id}}"
               class="btn btn-outline-secondary btn-sm">
                View
            </a>
        </div>
    </div>

</div>
</body>
</html>
