<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Feed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">TEAMWORK</span>
    </div>
</nav>

<div class="container mt-4">

    <h4>Welcome, <span th:text="${user.name}"></span></h4>

    <a class="btn btn-primary" th:href="@{/articles}">Articles</a>
    <a class="btn btn-success" th:href="@{/gifs}">GIFs</a>

    <hr>

    <h4>Articles</h4>
    <div th:each="article : ${articles}" class="card mb-3">
        <div class="card-body">
            <h5 th:text="${article.title}"></h5>
            <p th:text="${article.content}"></p>
            <small>
                By <span th:text="${article.author}"></span>
            </small>
        </div>
    </div>

    <hr>

    <h4>GIFs</h4>
    <div th:each="gif : ${gifs}" class="card mb-3">
        <div class="card-body">
            <h5 th:text="${gif.title}"></h5>
            <img th:src="${gif.imageUrl}" class="img-fluid"/>
            <small>
                By <span th:text="${gif.author}"></span>
            </small>
        </div>
    </div>

</div>

</body>
</html>
